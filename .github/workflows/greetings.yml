name: Greetings

on: [ pull_request_target , issues ]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }} 
          issue-message: "Hi Welcome to my DevOps Journey"
          pr-message: "This will be displayed on you first pull request"

          
