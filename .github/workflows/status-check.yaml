name: Status Check Functions

on: push

jobs:
    job-1:
        runs-on: ubuntu-latest
        steps:
          - name: fail
            run: exit 1
          - name: Step 1
            run: sleep 30
          - name: Runs on Failure
            if: failure()
            run: echo "Job failed"
          - name: Runs on success
            if: success()
            run: echo "Job Success"
          - name: Always Runs
            # if: success() || failure()
            if: always()
            run: echo 'Always runs'
          - name: runs when canclled
            if: cancelled()
            run: echo 'runs on cancelled'

    job-2:
        runs-on: ubuntu-latest
        needs: job-1
        if: failure()
        steps:
            - run: echo 'Job 2'
