name: Expression and Contexts

# on: [push, pull_request, issues, workflow_dispatch]
on: workflow_dispatch

run-name: "Expression & Context by @${{ github.actor }}, event: ${{ github.event_name }}"

jobs:
    runs-on-issues:
      runs-on: ubuntu-latest
      if: contains(fromJson('["issues", "pull_request"]'), github.event_name)
      steps:
        - name: Run on if issue has a bug label
          if: contains(github.event.issue.labels.*.name, 'bug')
          run: echo ${{ join(github.event.issue.labels.*.name , ', ') }}



    using-expression-and-contexts:
        runs-on: ubuntu-latest
        if: github.event_name == 'push'
        steps:
            - name: Expressions
              id: expressions
              run: |
                echo ${{1}}
                echo ${{'This is a stingg'}}
                echo ${{null}}
                echo ${{true}}
                echo ${{1 > 2}}
                echo ${{ 'string' == 'String'}}
                echo ${{ true && false }}
                echo ${{ true || (false && true) }}
            - name: Dump Contexts
              run: |
                echo "${{ toJson(github) }}"
                echo -e "\n-----------------------------------------------------------------------\n"
                echo "${{ toJson(job) }}"
                echo -e "\n-----------------------------------------------------------------------\n"
                echo "${{ toJson(secrets) }}"
                echo -e "\n-----------------------------------------------------------------------\n"
                echo "${{ toJson(steps) }}"
                echo -e "\n-----------------------------------------------------------------------\n"
                echo "${{ toJson(runner) }}"
