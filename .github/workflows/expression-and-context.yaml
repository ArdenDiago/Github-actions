name: Expression and Contexts

on: [push, pull_request, issues, workflow_dispatch]

jobs:
    using-expression-and-contexts:
        runs-on: ubuntu-latest
        steps:
            - name: Expressions
              id: expressions
              run: |
                echo ${{1}}
                echo ${{'This is a stingg'}}
                echo ${{null}}
                echo ${{true}}
                echo ${{1 > 2}}
                echo ${{ 'string' == 'String'}}
                echo ${{ true && false }}
                echo ${{ true || (false && true) }}
            - name: Dump Contexts
              run: |
                echo "${{ toJson(github) }}"
                echo -e "\n-----------------------------------------------------------------------\n"
                echo "${{ toJson(job) }}"
                echo -e "\n-----------------------------------------------------------------------\n"
                echo "${{ toJson(secrets) }}"
                echo -e "\n-----------------------------------------------------------------------\n"
                echo "${{ toJson(steps) }}"
                echo -e "\n-----------------------------------------------------------------------\n"
                echo "${{ toJson(runner) }}"
