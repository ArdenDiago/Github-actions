name: 10 - controlling the execution flow

on: 
    workflow_dispatch:
        inputs:
            pass-unit-tests:
                description: "Should the unit tests pass?"
                default: "true"

jobs: 
    lint-build:
        runs-on: ubuntu-latest
        steps:
            - name: Lint and build
              run: echo "Linting and building the code..."


    unit-test:
        runs-on: ubuntu-latest
        steps:
            - name: Run unit tests
              run: echo "Running unit tests..."
            - name: failing tests
              if : ${{ !inputs.pass-unit-tests }}
              run: exit 1

    deploy-nonprod:
        runs-on: ubuntu-latest
        needs:
            - lint-build
            - unit-test
        steps:
            - name: deploying to nonprod
              run: echo "Deploying t non prod"

    e2e-tests:
        runs-on: ubuntu-latest
        needs: deploy-nonprod
        steps:
            - name: Run e2e tests
              run: echo "Running e2e tests..."
  
    load-tests:
        runs-on: ubuntu-latest
        needs: deploy-nonprod
        steps:
            - name: Run load tests
              run: echo "Running load tests..."
    deploy-prod:
        runs-on: ubuntu-latest
        needs: 
            - e2e-tests
            - load-tests
        steps:
            - name: deploying to prod
              run: echo "Deploy to prod"