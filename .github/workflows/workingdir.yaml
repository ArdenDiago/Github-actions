name: Workflow Dir & Shell

on: 
  - push


jobs:
    display-wf-info:
        runs-on: ubuntu-latest
        steps:
            - name: display working diertory
              run: | 
                pwd 
                ls -a
                echo GITHUB_SHA
                echo $GITHUB_REPOSITORY
                echo $GITHUB_WORKSPACE

    display-wf-info-windows:
        runs-on: windows-latest
        steps:
            - name: display working diertory
              run: | 
                pwd 
                ls -a
                echo $GITHUB_SHA
                echo $GITHUB_REPOSITORY
                echo $GITHUB_WORKSPACE