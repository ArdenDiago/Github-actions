name: Env Vars

on: 
  - push

env:
    WF_LEVEL_ENV: Availabe to all jobs

jobs:
    env-var-and-context:
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        env: 
            JOB_LEVEL_ENV: Available in job level
        steps:
            - name: logs env var
              run: echo $GITHUB_REF 
            - name: log context
              run: echo '${{ github.ref }}'
            - name: set env var
              run: |
                echo "new_env_var=$(date)" >> "$GITHUB_ENV"
                echo "JOB_LEVEL_ENV=$RANDOM" >> "$GITHUB_ENV"
            - name: Multiline env var
              run: |
                DELIMITER=EOF
                echo "Random_joke<<$DELIMITER" >> "$GITHUB_ENV"
                echo "Here is a joke 1" >> "$GITHUB_ENV"
                echo "Here is a joke 2" >> "$GITHUB_ENV"
                echo "Here is a joke 3" >> "$GITHUB_ENV"
                curl -s https://icanhazdadjoke.com/ >> "$GITHUB_ENV"
                echo ""
                echo "$DELIMITER" >> "$GITHUB_ENV"

            - name: Logs custom Env vars
              env: 
                STEP_LEVEL_ENV: Availabe in step
                WF_LEVEL_ENV: Overriden
              run: |
                echo '${{ env.STEP_LEVEL_ENV }}'
                echo '${{ env.JOB_LEVEL_ENV }}'
                echo '${{ env.WF_LEVEL_ENV }}'
                echo '${{ env.new_env_var }}'
                echo "${{env.Random_joke}}"