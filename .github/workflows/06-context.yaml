name: 06 - Context
run-name: 06 Context | Debug - ${{ inputs.debug}}

on: 
    push:
    workflow_dispatch:
      inputs:
        debug:
          type: boolean
          default: false


jobs:
    echo-data:
        runs-on: ubuntu-latest
        steps:
            - name: Display information
              run: |
                echo "Event Name: ${{ github.envent_name}}"
                echo "Ref: ${{ github.ref }}"
                echo "SHA: ${{ github.sha }}"
                echo "Actor: ${{ github.actor }}"
                echo "Workflow: ${{ github.workflow }}"
                echo "Run ID: ${{ github.run_id }}"
                echo "Run number: ${{ github.run_number }}"
            
            - name: Retrive Variables
              run: |
                echo "Variables value: ${{ vars.MY_VAR }}"
