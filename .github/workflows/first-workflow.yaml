name: First Workflow

on: 
  - push
  - workflow_dispatch

jobs:
  runn-shell-commands:
    runs-on: ubuntu-latest
    steps:
      - name: echo a string
        run: echo "Hello World"

      - name: Multi run commands
        run: |
          node -v
          npm -v

  parallel-jobs-macos:
    runs-on: macos-latest
    steps:
      - name: view sw version
        run: sw_vers
    
  dependanct-jobs:
    runs-on: windows-latest
    needs: runn-shell-commands
    steps:
      - name: echo a string
        run: Write-Output "Windows String"
      - name: Error steps
        run: doesnotexitssss